name: CI

on:
  push:
  pull_request:

jobs:
  validation-gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev + optional accel)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run validation gate (numba inactive)
        run: pytest -q
      - name: Install Numba and re-run (numba active, must agree bitwise)
        run: |
          pip install "numba>=0.59" || echo "numba unavailable on this Python; skipping accel run"
          pytest -q
