# Independent review v2 reproduction of the committed M5 spectral artifact.
# Same scientific settings as configs/spectral_probe.yaml; only run_id and
# description differ so append-only results are preserved.
run_id: review_gpt5_spectral_repro_20260624
description: >-
  Independent review reproduction of the exact local-Kawasaki Metropolis
  transition matrix on the 4x4 M=0 sector at the bath temperature; same
  scientific settings as m5_spectral_v1.
lattice:
  N: 4
  magnetisation: 0
T_f_over_Tc: [0.5, 0.6, 0.75]
T_f_default_over_Tc: 0.6
T_i_grid: [2.4, 2.8, 3.5, 5.0, 10.0]
T_i_fine: {min: 2.30, max: 12.0, n: 60}
primary_pair: {T_i_hot: 10.0, T_i_cold: 2.4}
spectrum_k: 30
overlap_tol: 1.0e-6
gap_validation:
  kernel: local
  sweeps_burn: 2000
  n_samples: 40000
  seed: 2
seed: 90909
